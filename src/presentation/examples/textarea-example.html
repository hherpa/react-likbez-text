<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LikbezText - Textarea Example</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; }
    .container { display: flex; height: 100vh; }
    .editor-pane { width: 50%; display: flex; flex-direction: column; border-right: 1px solid #ddd; background: #fff; }
    .editor-pane-header { padding: 16px 20px; background: #fafafa; border-bottom: 1px solid #eee; font-weight: 600; font-size: 14px; }
    .editor-textarea { flex: 1; width: 100%; padding: 20px; border: none; resize: none; font-family: 'Monaco', 'Menlo', monospace; font-size: 14px; line-height: 1.6; }
    .editor-textarea:focus { outline: none; }
    .preview-pane { width: 50%; display: flex; flex-direction: column; background: #fff; }
    .preview-content { flex: 1; padding: 20px; overflow-y: auto; }
    .element-wrapper { margin-bottom: 16px; }
    .box-katex { padding: 12px; background: #f0f7ff; border: 1px solid #bbdefb; border-radius: 4px; text-align: center; }
    .box-siglum { padding: 16px; background: #fff; border: 2px solid #2196F3; border-radius: 8px; }
    .markdown-content { line-height: 1.6; }
    .markdown-content h1 { font-size: 2em; margin: 0 0 0.5em 0; border-bottom: 1px solid #eee; }
    .markdown-content h2 { font-size: 1.5em; margin: 1em 0 0.5em 0; }
    .markdown-content p { margin: 0 0 1em 0; }
    .markdown-content code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
    .markdown-content pre { background: #f4f4f4; padding: 16px; border-radius: 6px; overflow-x: auto; }
    .markdown-content ul, .markdown-content ol { margin: 0 0 1em 0; padding-left: 2em; }
    .markdown-content strong { font-weight: 600; }
    .loading { color: #999; font-size: 14px; }
    .siglum-label { font-weight: 600; margin-bottom: 8px; color: #1976D2; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="importmap">
  {
    "imports": {
      "@siglum/engine": "/node_modules/@siglum/engine/src/index.js",
      "@siglum/filesystem": "/node_modules/@siglum/filesystem/dist/index.js"
    }
  }
  </script>
  <script type="module">
    import { SiglumCompiler } from '@siglum/engine';
    window.SiglumCompiler = SiglumCompiler;
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="worker.js"></script>
  <script src="busytex.js"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useMemo, useEffect, useRef } = React;

    // Domain
    const createRenderBox = (overrides = {}) => ({
      dimensions: { width: 'auto', height: 'auto' },
      style: { padding: 8, borderRadius: 4 },
      ...overrides,
    });

    const generateId = () => `elem_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;

    // Parser - $$ for KaTeX display, $$$$ for Siglum full LaTeX
    const createParser = () => (source) => {
      const elements = [];
      const patterns = [
        { type: 'siglum', regex: /\{siglum\}([\s\S]*?)\{\/siglum\}/g },
        { type: 'katex', regex: /\$\$([^\$]+?)\$\$/g },
        { type: 'katex', regex: /\$([^\$\n]+?)\$/g },
      ];
      const tokenPositions = [];

      for (const pattern of patterns) {
        const regex = new RegExp(pattern.regex.source, pattern.regex.flags);
        let match;
        while ((match = regex.exec(source)) !== null) {
          tokenPositions.push({
            start: match.index,
            end: match.index + match[0].length,
            element: { id: generateId(), type: pattern.type, rawContent: match[1].trim(), renderBox: createRenderBox() }
          });
        }
      }

      tokenPositions.sort((a, b) => a.start - b.start);
      const used = new Array(source.length).fill(false);
      for (const t of tokenPositions) {
        for (let i = t.start; i < t.end; i++) { if (used[i]) { t.element = null; break; } }
        if (t.element) for (let i = t.start; i < t.end; i++) used[i] = true;
      }

      const filtered = tokenPositions.filter(t => t.element);
      let lastEnd = 0;
      for (const t of filtered) {
        if (t.start > lastEnd) {
          const text = source.slice(lastEnd, t.start).trim();
          if (text) elements.push({ id: generateId(), type: 'markdown', rawContent: text, renderBox: createRenderBox() });
        }
        elements.push(t.element);
        lastEnd = t.end;
      }
      if (lastEnd < source.length) {
        const text = source.slice(lastEnd).trim();
        if (text) elements.push({ id: generateId(), type: 'markdown', rawContent: text, renderBox: createRenderBox() });
      }
      return { elements };
    };

    // Markdown Renderer
    const createMarkdownRenderer = (defaultBox) => ({
      render: (element) => {
        let html = element.rawContent
          .replace(/^### (.*$)/gm, '<h3>$1</h3>')
          .replace(/^## (.*$)/gm, '<h2>$1</h2>')
          .replace(/^# (.*$)/gm, '<h1>$1</h1>')
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/\*([^*]+)\*/g, '<em>$1</em>')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\n/g, '<br>');
        return { content: <div className="markdown-content" dangerouslySetInnerHTML={{ __html: html }} /> };
      }
    });

    // KaTeX Renderer
    const createKaTeXRenderer = (defaultBox) => ({
      render: (element, config = {}) => {
        console.log('KaTeX render:', element.rawContent);
        let html;
        try {
          if (typeof katex === 'undefined') {
            return { content: <div className="box-katex" style={{color:'red'}}>KaTeX not loaded</div> };
          }
          html = katex.renderToString(element.rawContent, { 
            displayMode: element.rawContent.includes('\\'), 
            throwOnError: false, 
            ...config 
          });
        } catch (e) { 
          console.error('KaTeX error:', e);
          html = `<span style="color:#cc0000">KaTeX Error: ${e.message}</span>`; 
        }
        return { content: <div className="box-katex" dangerouslySetInnerHTML={{ __html: html }} /> };
      }
    });

    // Siglum Renderer
    const createSiglumRenderer = (defaultBox) => {
      let compiler = null;
      let logs = [];
      return {
        init: async () => {
          if (typeof SiglumCompiler === 'undefined') { console.warn('Siglum not found'); return; }
          compiler = new SiglumCompiler({
            bundlesUrl: '/bundles',
            wasmUrl: '/busytex.wasm',
            workerUrl: '/worker.js',
            verbose: true,
            onLog: (msg) => { logs.push(msg); console.log('[TeX]', msg); },
          });
          await compiler.init();
          console.log('Siglum initialized');
        },
        render: async (element) => {
          logs = []; // Clear logs before each compile
          if (!compiler) return { content: <div className="loading">Initializing Siglum...</div> };
          const latex = `\\documentclass{article}\\usepackage{amsmath}\\begin{document}${element.rawContent}\\end{document}`;
          let result;
          try {
            result = await compiler.compile(latex, { engine: 'pdflatex' });
          } catch (e) {
            return { content: <div className="box-siglum" style={{color:'#c62828'}}>Compilation error: {String(e)}</div> };
          }
          
          if (!result) {
            return { content: <div className="box-siglum" style={{color:'#c62828'}}>No result from compiler</div> };
          }
          
          if (result.success && result.pdf) {
            // Copy from SharedArrayBuffer to regular ArrayBuffer
            const pdfBuffer = result.pdfIsShared ? new Uint8Array(result.pdf).slice() : new Uint8Array(result.pdf);
            const url = URL.createObjectURL(new Blob([pdfBuffer], { type: 'application/pdf' }));
            return { content: (
              <div className="box-siglum">
                <div className="siglum-label">LaTeX (Siglum)</div>
                <object data={url} type="application/pdf" width="100%" height="300px" />
              </div>
            )};
          }
          
          // Show error logs from TeX
          const texErrors = logs.filter(l => l.includes('[TeX ERR]') || l.includes('! LaTeX Error') || l.includes('Error:'));
          const errorText = texErrors.length > 0 ? texErrors.join('\n') : 'Unknown error (check console for details)';
          
          return { content: (
            <div className="box-siglum" style={{color:'#c62828', fontSize:'11px', maxHeight:'200px', overflow:'auto'}}>
              <strong>LaTeX Error:</strong>
              <pre style={{whiteSpace:'pre-wrap', margin:'8px 0 0 0'}}>{errorText}</pre>
            </div>
          )};
        }
      };
    };

    // Main Component
    const LikbezText = ({ source, katexConfig }) => {
      const [siglumReady, setSiglumReady] = useState(false);
      const [siglumResults, setSiglumResults] = useState({});
      const siglumRef = useRef(null);
      const defaultBox = createRenderBox();
      const parserFn = useMemo(() => createParser(), []);
      const parsed = useMemo(() => parserFn(source), [source, parserFn]);

      useEffect(() => {
        siglumRef.current = createSiglumRenderer(defaultBox);
        siglumRef.current.init().then(() => setSiglumReady(true)).catch(console.error);
      }, []);

      useEffect(() => {
        const render = async () => {
          const els = parsed.elements.filter(e => e.type === 'siglum');
          const results = {};
          for (const el of els) if (siglumRef.current) results[el.id] = (await siglumRef.current.render(el)).content;
          setSiglumResults(results);
        };
        if (siglumReady) render();
      }, [parsed, siglumReady]);

      const renderEl = (el) => {
        switch (el.type) {
          case 'markdown': return createMarkdownRenderer(defaultBox).render(el).content;
          case 'katex': return createKaTeXRenderer(defaultBox).render(el, katexConfig).content;
          case 'siglum': return siglumResults[el.id] || <div className="loading">Rendering LaTeX...</div>;
          default: return <div>Unknown: {el.type}</div>;
        }
      };

      return (
        <div>{parsed.elements.map(el => <div key={el.id} className="element-wrapper">{renderEl(el)}</div>)}</div>
      );
    };

    // App
    const DEFAULT_SOURCE = `# Scientific Document

Welcome to **LikbezText**!

## Math

Inline: $E = mc^2$

Display: $$x = \\frac{-b \\pm \\sqrt{b^2-4ac}}{2a}$$

## LaTeX (Siglum)

{siglum}
\\begin{align}
  \\int_{-\\infty}^{\\infty} e^{-x^2} dx &= \\sqrt{\\pi}
\\end{align}
{/siglum}
`;

    const App = () => {
      const [source, setSource] = useState(DEFAULT_SOURCE);
      return (
        <div className="container">
          <div className="editor-pane">
            <div className="editor-pane-header">Editor</div>
            <textarea className="editor-textarea" value={source} onChange={e => setSource(e.target.value)} />
          </div>
          <div className="preview-pane">
            <div className="editor-pane-header">Preview</div>
            <div className="preview-content"><LikbezText source={source} katexConfig={{ displayMode: true }} /></div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
